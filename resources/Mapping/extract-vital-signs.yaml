resourceType: Mapping
id: extract-vital-signs
type: FHIRPath
body:
  "{% assign %}":
    - patientId: "{{ %QuestionnaireResponse.answers('patientId') }}"
    - bodyTemperature: "{{ %QuestionnaireResponse.answers('body-temperature').value }}"
    - bodyTemperatureUnit: "{{ iif(%QuestionnaireResponse.answers('body-temperature').unit.exists(), %QuestionnaireResponse.answers('body-temperature').unit, 'C') }}"
    - bodyTemperatureCode: "{{ iif(%QuestionnaireResponse.answers('body-temperature').code.exists(), %QuestionnaireResponse.answers('body-temperature').code, 'Cel') }}"
    - tempSeverity: "{{ %QuestionnaireResponse.answers('temp-severity-hidden') }}"

  resourceType: Bundle
  type: transaction
  entry:
    - request:
        url: /Observation
        method: POST
      fullUrl: "{{ 'urn:uuid:observation-body-temperature' }}"
      resource:
        resourceType: Observation
        meta:
          profile:
            - http://hl7.org.au/fhir/core/StructureDefinition/au-core-bodytemperature
        status: final
        category:
          - coding:
              - system: http://terminology.hl7.org/CodeSystem/observation-category
                code: vital-signs
                display: Vital Signs
        code:
          coding:
            - system: http://loinc.org
              code: "8310-5"
              display: Body temperature
          text: Body temperature
        subject:
          reference: "Patient/{{ %patientId }}"
        effectiveDateTime: "{{ now() }}"
        valueQuantity:
          value: "{{ %bodyTemperature }}"
          unit: "{{ %bodyTemperatureUnit }}"
          system: http://unitsofmeasure.org
          code: "{{ %bodyTemperatureCode }}"
        "{% merge %}":
          - "{% if %tempSeverity.exists() and %tempSeverity != '' %}":
              note:
                - text: "Derived severity: {{ %tempSeverity }}"