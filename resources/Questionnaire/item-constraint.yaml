resourceType: Questionnaire
id: item-constraint
name: item-constraint
title: Item Constraint
description: >-
  Demonstrates `itemConstraint` with two fields where one field is mandatory.
status: active
subjectType:
  - Patient
url: "http://example.org/fhir/Questionnaire/item-constraint"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
item:
  - linkId: instructions
    text: >-
      Instructions: This form has two fields. Primary contact is mandatory.
      If Secondary contact is provided, it must differ from Primary contact.
    type: display

  - linkId: primary-contact
    text: Primary contact
    type: string
    required: true
    entryFormat: Enter primary contact value

  - linkId: secondary-contact
    text: Secondary contact
    type: string
    entryFormat: Optional; must differ from primary contact
    itemConstraint:
      - key: secondary-not-equal-primary
        requirements: Secondary contact, if present, must not duplicate primary contact
        severity: error
        human: Secondary contact must be different from primary contact
        expression: >-
          %QuestionnaireResponse.item.where(linkId='secondary-contact').answer.empty() or
          %QuestionnaireResponse.item.where(linkId='secondary-contact').answer.first() !=
          %QuestionnaireResponse.item.where(linkId='primary-contact').answer.first()
