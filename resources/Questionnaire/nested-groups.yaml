resourceType: Questionnaire
id: nested-groups
name: nested-groups
title: Nested Questionnaire.item.item
description: >-
  Demonstrates nested `Questionnaire.item.item` hierarchy, including a repeating subgroup.
status: active
subjectType:
  - Patient
url: "http://example.org/fhir/Questionnaire/nested-groups"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
item:
  - linkId: instructions
    text: >-
      Instructions: Fill the nested fields under General section, then add one or more
      rows under Medications to verify repeating subgroup behavior.
    type: display

  - linkId: assessment-root
    text: Assessment root group
    type: group
    item:
      - linkId: general-section
        text: General section
        type: group
        item:
          - linkId: chief-complaint
            text: Chief complaint
            type: text
            entryFormat: Enter the patient's chief complaint
          - linkId: onset-date
            text: Onset date
            type: date

      - linkId: medications-section
        text: Medications (repeating subgroup)
        type: group
        repeats: true
        item:
          - linkId: medication-name
            text: Medication name
            type: string
            entryFormat: Enter the medication name
          - linkId: medication-dose
            text: Dose
            type: string
            entryFormat: Enter the medication dose
