resourceType: Questionnaire
id: extract-vital-signs
name: extract-vital-signs
title: Extract Vital Signs
status: active
url: "http://example.org/fhir/Questionnaire/extract-vital-signs"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
launchContext:
  - name:
      code: Patient
    type:
      - Patient
contained:
  - id: 421fd51c-fe94-4a7f-ab1e-f91c2572bcb3
    code:
      coding:
        - code: 8310-5
          system: http://loinc.org
          display: Body temperature
    valueQuantity:
      extension:
        - url: >-
            http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-templateExtractValue
          valueString: answer.valueQuantity
    status: final
    subject:
      _reference:
        extension:
          - url: >-
              http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-templateExtractValue
            valueString: >-
              'Patient/' +
              %resource.item.where(linkId='patientId').answer.valueString
    resourceType: Observation
item:
  - linkId: patientId
    text: PatientId
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id.first()"

  - linkId: body-temperature
    text: Body temperature
    type: quantity
    required: true
    extension:
    - url: http://hl7.org/fhir/uv/sdc/StructureDefinition/sdc-questionnaire-templateExtract
      extension:
      - url: template
        valueReference:
          reference: '#421fd51c-fe94-4a7f-ab1e-f91c2572bcb3'
    unitOption:
      - code: Cel
        system: http://unitsofmeasure.org
        display: C
    code:
      - system: http://loinc.org
        code: "8310-5"
        display: Body temperature

  - linkId: temp-severity-hidden
    text: Temperature severity (hidden)
    type: string
    hidden: true
    calculatedExpression:
      language: text/fhirpath
      expression: >-
        iif(
          %resource.repeat(item).where(linkId='body-temperature').answer.valueQuantity.value.exists(),
          iif(
            %resource.repeat(item).where(linkId='body-temperature').answer.valueQuantity.value.first() >= 38,
            'fever',
            'normal'
          ),
          ''
        )
