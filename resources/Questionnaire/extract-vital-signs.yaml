resourceType: Questionnaire
id: extract-vital-signs
name: extract-vital-signs
title: Extract Vital Signs
status: active
url: "http://example.org/fhir/Questionnaire/extract-vital-signs"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
launchContext:
  - name:
      code: Patient
    type:
      - Patient
item:
  - linkId: patientId
    text: PatientId
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id.first()"

  - linkId: body-temperature
    text: Body temperature
    type: quantity
    required: true
    unitOption:
      - code: Cel
        system: http://unitsofmeasure.org
        display: C
    code:
      - system: http://loinc.org
        code: "8310-5"
        display: Body temperature

  - linkId: temp-severity-hidden
    text: Temperature severity (hidden)
    type: string
    hidden: true
    calculatedExpression:
      language: text/fhirpath
      expression: >-
        iif(
          %resource.repeat(item).where(linkId='body-temperature').answer.valueQuantity.value.exists(),
          iif(
            %resource.repeat(item).where(linkId='body-temperature').answer.valueQuantity.value.first() >= 38,
            'fever',
            'normal'
          ),
          ''
        )
