resourceType: Questionnaire
id: launch-context
name: launch-context
title: Launch Context
status: active
url: "http://example.org/fhir/Questionnaire/launch-context"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
launchContext:
  - name:
      code: Patient
    type:
      - Patient
item:
  - linkId: instructions
    text: >-
      Instructions: Open this form in Patient context.
      Patient ID and full name are prefilled from %Patient launch context.
    type: display

  - linkId: patient-id
    text: Patient ID from launchContext
    type: string
    readOnly: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id"

  - linkId: patient-name
    text: Patient name from launchContext
    type: string
    readOnly: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.name.first().given.first() + ' ' + %Patient.name.first().family"
