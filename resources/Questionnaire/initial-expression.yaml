resourceType: Questionnaire
id: initial-expression
name: initial-expression
title: InitialExpression
description: >-
  Demonstrates `initialExpression` pre-population from launch context `Patient`
  (name, gender, birth date, telecom, and SSN).
status: active
subjectType:
  - Patient
url: "http://example.org/fhir/Questionnaire/initial-expression"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
launchContext:
  - name:
      code: Patient
    type:
      - Patient
item:
  - linkId: patientId
    text: PatientId
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id"

  - linkId: instructions
    text: >-
      Instructions: Open the form to review fields pre-populated by
      `initialExpression` from launch context Patient.
    type: display
      
  - linkId: patient-name
    text: Name
    type: string
    readOnly: true
    entryFormat: Firstname Lastname
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.name.given.first() & ' ' & %Patient.name.family.first()"

  - linkId: patient-gender
    text: Gender
    type: string
    readOnly: true
    entryFormat: Female/Male/Other
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.gender"

  - linkId: patient-birth-date
    text: Date of birth
    type: date
    readOnly: true
    entryFormat: dd/mm/yyyy
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.birthDate"

  - linkId: patient-phone
    text: Phone number
    type: string
    readOnly: true
    entryFormat: Phone number
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.telecom.where(system='phone').value.first()"

  - linkId: patient-email
    text: Email
    type: string
    readOnly: true
    entryFormat: Email address
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.telecom.where(system='email').value.first()"

  - linkId: patient-ssn
    text: SSN
    type: string
    readOnly: true
    entryFormat: SSN
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.identifier.where(system='http://hl7.org/fhir/sid/us-ssn').value.first()"
