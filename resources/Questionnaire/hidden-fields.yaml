resourceType: Questionnaire
id: hidden-fields
name: hidden-fields
title: Hidden Fields
status: active
url: "http://example.org/fhir/Questionnaire/hidden-fields"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
item:
  - linkId: pulse
    type: integer
    entryFormat: "Enter a value between 60 and 260"
    text: Pulse

  - linkId: severity
    text: Derived severity
    type: string
    hidden: true
    calculatedExpression:
      language: text/fhirpath
      expression: >-
        iif(
          %resource.repeat(item).where(linkId='pulse').answer.valueInteger.exists() and
          %resource.repeat(item).where(linkId='pulse').answer.valueInteger.first() >= 1,
          iif(
            %resource.repeat(item).where(linkId='pulse').answer.valueInteger.first() > 110,
            'High',
            iif(
              %resource.repeat(item).where(linkId='pulse').answer.valueInteger.first() < 60,
              'Critical low',
              'Normal'
            )
          ),
          ''
        )

  - linkId: severity-view
    text: Severity
    type: string
    readOnly: true
    calculatedExpression:
      language: text/fhirpath
      expression: >-
        iif(
          %resource.repeat(item).where(linkId='pulse').answer.valueInteger.exists() and
          %resource.repeat(item).where(linkId='pulse').answer.valueInteger.first() >= 1,
          iif(
            %resource.repeat(item).where(linkId='pulse').answer.valueInteger.first() > 110,
            'High',
            iif(
              %resource.repeat(item).where(linkId='pulse').answer.valueInteger.first() < 60,
              'Critical low',
              'Normal'
            )
          ),
          '—'
        )