resourceType: Questionnaire
id: source-queries
name: source-queries
title: Source Queries
status: active
url: "http://example.org/fhir/Questionnaire/source-queries"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
launchContext:
  - name:
      code: Patient
    type:
      - Patient
sourceQueries:
  - reference: "#ConditionBundle"
contained:
  - resourceType: Bundle
    id: ConditionBundle
    type: batch
    entry:
      - request:
          method: GET
          url: /Condition?patient=Patient/{{ %Patient.id }}&_sort=-recorded-date&_count=200
item:
  - linkId: patientId
    text: PatientId
    type: string
    hidden: true
    initialExpression:
      language: text/fhirpath
      expression: "%Patient.id.first()"

  - linkId: conditions-summary
    text: Conditions
    type: text
    readOnly: true
    initialExpression:
      language: text/fhirpath
      expression: >-
        %ConditionBundle.entry.resource.entry.resource
        .select(
          'Name: ' & (code.coding.first().display | code.text).first()
        )
        .join('\n')