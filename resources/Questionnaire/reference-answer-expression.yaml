resourceType: Questionnaire
id: reference-answer-expression
name: reference-answer-expression
title: Reference with answerExpression
description: >-
  Demonstrates `type: reference` with `answerExpression` query and `choiceColumn` display formatting.
status: active
subjectType:
  - Patient
url: "http://example.org/fhir/Questionnaire/reference-answer-expression"
meta:
  profile:
    - https://emr-core.beda.software/StructureDefinition/fhir-emr-questionnaire
item:
  - linkId: instructions
    text: >-
      Instructions: Use the reference picker to select a Practitioner loaded by
      `answerExpression`; displayed options are formatted by `choiceColumn`.
    type: display

  - linkId: attending-practitioner
    text: Attending practitioner
    type: reference
    referenceResource:
      - Practitioner
    answerExpression:
      language: application/x-fhir-query
      expression: "Practitioner"
    choiceColumn:
      - forDisplay: true
        path: name.given.first() + ' ' + name.family
